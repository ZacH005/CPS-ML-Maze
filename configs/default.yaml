camera:
  # Stage 0 fixed-camera runtime convention:
  # - Reference image: calibration/CURRENT_FIXED_CAMERA_VIEW.png
  # - Image frame: OpenCV pixels, origin top-left, x right, y down.
  # - Accepted orientation: Start near top-right, Finish near bottom-left.
  # Changing device, mode, flips, crop, or camera pose invalidates later
  # waypoints, recordings, and calibration files.
  convention: "opencv_px_top_left_start_top_right_finish_bottom_left"
  reference_image: "calibration/CURRENT_FIXED_CAMERA_VIEW.png"
  device_index: 0  # per-machine: 1 on the Windows lab PC
  width: 1280
  height: 800
  fps: 120
  flip_horizontal: false
  flip_vertical: false

serial:
  port: "/dev/cu.usbmodem1101"
  baudrate: 500000
  timeout_s: 0.2

servo:
  yaw_channel: 0
  pitch_channel: 1
  neutral_us: 1500
  min_us: 1200
  max_us: 1800
  max_delta_us_per_command: 500
  watchdog_ms: 500

vision:
  # Reflective silver is difficult; start with bright-blob detection and tune on real frames.
  min_blob_area_px: 25
  max_blob_area_px: 5000
  threshold_value: 220
  use_otsu: false
  clahe_clip: 2.0
  morph_kernel: 5
  blur_kernel: 5
  # debug overlay for visualizing preprocessing and candidates
  debug_overlay: false
  debug_overlay_every_n: 1
  debug_start_stage: "binary"
  save_debug: false
  smoothing_alpha: 0.6

control:
  lookahead_mm: 25.0
  kp: 0.015
  kd: 0.006
  max_command: 1.0

maze:
  # Play-area size. VERIFY WITH A RULER: merged value was 3220x2820,
  # assumed to mean 322.0x282.0 mm.
  # Maze dimensions: 322.0x282.0 mm
  # actual play area size is 263mm x 222mm
  width_mm: 263.0
  height_mm: 222.0
  path_file: "configs/example_path.csv"
