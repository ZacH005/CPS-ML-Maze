camera:
  # Stage 0 fixed-camera runtime convention:
  # - Reference image: calibration/CURRENT_FIXED_CAMERA_VIEW.png
  # - Image frame: OpenCV pixels, origin top-left, x right, y down.
  # - Accepted orientation: Start near top-right, Finish near bottom-left.
  # Changing device, mode, flips, crop, or camera pose invalidates later
  # waypoints, recordings, and calibration files.
  convention: "opencv_px_top_left_start_top_right_finish_bottom_left"
  reference_image: "calibration/CURRENT_FIXED_CAMERA_VIEW.png"
  device_index: 0  # per-machine: 1 on the Windows lab PC
  width: 1280
  height: 800
  fps: 120
  flip_horizontal: false
  flip_vertical: false
  # Attach to scripts/camera_server.py if it is running, so the slow MSMF open
  # (10-30 s) is paid ONCE by the server instead of by every script. Start the
  # server at the top of a calibration/lab session and all tools open
  # instantly. Set false (or export CPS_CAMERA_NO_SERVER=1) to always open the
  # device directly. Harmless when no server is running - it falls through.
  use_shared_server: true

serial:
  port: "/dev/cu.usbmodem1101"
  baudrate: 500000
  timeout_s: 0.2

servo:
  yaw_channel: 0
  pitch_channel: 1
  neutral_us: 1500
  min_us: 1200
  max_us: 1800
  max_delta_us_per_command: 500
  watchdog_ms: 500

vision:
  # Live detector: "pipeline" = motion + specular-highlight tracker (same core
  # as scripts/pipeline.py, built for holes that look like the ball);
  # "bright_blob" = original threshold detector.
  tracker: "pipeline"
  # Specular gate for the pipeline tracker. Measured on this rig with
  # debug_tracking: ball glints 243 when still, everything else <= ~210.
  # MUST stay BELOW the still-ball glint (243): a parked ball has no motion
  # cue, so it must pass this gate or it vanishes the moment it stops - which
  # also blinds stall detection. 250 was above 243 and made a stationary ball
  # disappear (observed: lost after sitting still ~25 s). 230 leaves margin on
  # both sides (243 ball, ~210 background). Re-measure per lighting session.
  min_specular: 230
  # Motion blur smears the glint exactly when the ball moves fast (observed
  # dips to ~194 while tracked). Motion-cue candidates are already strong
  # evidence (moving, round, ball-sized), so they get a lower gate.
  motion_min_specular: 185
  # Optional confusers/ROI JSON from `pipeline.py --calibrate`; loaded if present.
  confusers_file: "calibration/live_confusers.json"
  # ROI is selected from a fresh fixed-camera still. It overrides any older ROI
  # embedded inside live_confusers.json so debug/live tracking shows the newest
  # playable-surface polygon immediately.
  roi_file: "calibration/live_roi.json"
  # Demo tracking policy: use click-to-seed and reject implausible jumps
  # instead of auto-locking onto arbitrary bright spots.
  auto_seed: false
  auto_reseed: false
  seed_r: 12
  report_predicted: false
  # Jump gates are in px per PROCESSED frame. The control loop runs well
  # below the camera's 120fps (detect + draw + log), so a fast roll moves
  # the ball 40-60px between processed frames; gates must tolerate that or
  # fast motion gets rejected as an implausible jump (= lost ball).
  max_jump_px: 60
  max_search_px: 120
  search_growth: 1.15
  max_predict_frames: 2
  max_velocity_px_per_frame: 70
  max_single_frame_jump_px: 90
  allow_global_reacquire: false
  template_min_score: 0.55
  template_search_px: 45
  template_max_correction_px: 30
  # Reflective silver is difficult; start with bright-blob detection and tune on real frames.
  min_blob_area_px: 25
  max_blob_area_px: 5000
  threshold_value: 220
  use_otsu: false
  clahe_clip: 2.0
  morph_kernel: 5
  blur_kernel: 5
  # debug overlay for visualizing preprocessing and candidates
  debug_overlay: false
  debug_overlay_every_n: 1
  debug_start_stage: "binary"
  save_debug: false 
  smoothing_alpha: 0.6

control:
  # "carrot" (default): chase a real lookahead point with velocity feedback.
  # "velocity": track local path tangent; "position": legacy lookahead PD.
  mode: "carrot"
  v_max_mm_s: 25  # cruise speed on straights; raise only when reliable
  min_speed_frac: 0.55   # floor on cornering/near-wall crawl speed
  # Corner braking, calibrated on the real traced path (2026-07-10): with
  # the old span 30 / slow_deg 70 the accumulated turning exceeded the full-
  # slowdown threshold on 70% of the route - the ball crawled almost
  # everywhere and slowdowns felt random. These values discriminate: crawl
  # floor on 17% of the route (the actual corners), full speed on 41%.
  corner_slow_deg: 95  # accumulated turning that maps to full slowdown
  corner_span_mm: 15.0    # how far ahead turning is accumulated (~0.5s warning)
  # Per-step deadband when accumulating turning: the auto-traced line has
  # small zigzags, and counting them makes straights read as phantom corners.
  corner_noise_deg: 12.0
  k_lat: 1.6             # pull toward centerline (per mm of cross-track)
  lat_v_max_mm_s: 18.0
  k_vel: 0.012           # tilt per mm/s of velocity error
  carrot_lookahead_mm: 20
  carrot_min_lookahead_mm: 4.0
  lookahead_mm: 18.0
  kp: 0.015
  kd: 0.006
  # Integral: walks the command up while the ball refuses to move and
  # absorbs a slightly non-level neutral. Keep small.
  ki: 0.004
  integral_limit: 0.25
  # Stiction compensation: below ~this tilt the ball does not move at all
  # (measured with axis_check). When the ball is stalled away from the
  # target, the command is scaled up to at least this magnitude - but only
  # once low speed has PERSISTED (a single slow frame also happens during
  # ordinary braking into a corner, which is not stiction).
  stall_kick: 0.30
  # MUST stay below the speed profile's minimum (the runner clamps it if
  # not): planned slow rolling through a hole pass must never be mistaken
  # for a stall, or the kick launches the ball exactly where the plan wants
  # it careful. This exact conflict caused the "spazzing" at hole passes.
  stall_speed_mm_s: 5.0
  # Velocity/carrot mode: still apply the stiction kick during intentional
  # corner/wall crawl. This must stay below v_max_mm_s * min_speed_frac
  # (currently 10.5 mm/s), otherwise full slowdowns disable breakaway tilt.
  stall_request_speed_mm_s: 1.0
  stall_dist_mm: 8.0
  stall_min_duration_s: 0.3
  # Escalate the kick while the stall persists (+X command per second of
  # stall), so spots whose breakaway tilt exceeds stall_kick still unstick.
  # The kick timer also has hysteresis so velocity-estimate noise cannot
  # toggle it on/off (the on/off toggling was visible as board jitter with
  # the ball sitting balanced).
  stall_kick_ramp_per_s: 0.25
  # Max |servo command| change per second sent to hardware; smooths sudden
  # jumps (stiction kicks, re-association) so corners aren't punched through.
  command_slew_per_s: 4
  max_command: 1
  # --- Braking authority ---
  # max_command is a gentleness cap for DRIVING. Stopping a fast ball needs
  # more tilt than driving does: commands that oppose the current motion may
  # use the full firmware range, and reverse much faster than the driving
  # slew (reversing +0.45 -> -0.45 at 3.0/s wastes 300 ms = 60 mm at
  # 200 mm/s). The firmware pulse clamp still bounds everything.
  brake_max_command: 1
  brake_slew_per_s: 12
  # ABS: tilt is FORCE, so a brake tilt still applied when the ball stops
  # launches it backward (observed: braked to a stop at hole 2, then
  # launched backward to 65 mm/s and oscillated into the hole). The brake
  # ceiling shrinks with speed - floor + per_mm_s * speed - so the board is
  # ~flat by the time the ball stops.
  brake_cmd_per_mm_s: 0.012
  brake_cmd_floor: 0.06
  # Calm control near holes: read the plan where the ball will be in
  # plan_latency_s (brake INTO slow zones instead of after overshooting
  # them), and cap command magnitude inside slow zones so corrections
  # near holes are small and steady - control, not violent avoidance.
  plan_latency_s: 0.35
  slowzone_max_command: 0.55
  # Velocity smoothing time constant (seconds). FRAME-RATE INVARIANT: the
  # estimator uses an effective per-frame factor dt/(tau+dt), so the real-time
  # smoothing is the same at 10 fps or 120 fps. This matters a lot: velocity is
  # a finite difference whose noise grows as 1/dt, and the old fixed-alpha
  # filter smoothed a fixed fraction PER FRAME, so at 120 fps it smoothed ~10x
  # less and the parked-ball velocity jittered enough to block the stall-kick
  # from firing - the ball moved fine at 10 fps and under manual control but
  # would not break free from the start at 120 fps. Larger tau = smoother but
  # more lag; lower it if fast braking feels sluggish.
  velocity_tau_s: 0.10
  # --- Velocity-estimate guards (feed speed to control + stabilize) ---
  # The MSMF camera path delivers occasional burst frames ~0 ms apart; dividing
  # sub-mm detection jitter by ~0 s manufactured 300-490 mm/s phantom speeds
  # that constantly tripped the stabilize state. Ignore the velocity from
  # frames closer than this in time (treat as duplicates):
  velocity_min_dt_s: 0.006
  # And clamp any single measured velocity above this before it enters the
  # smoothing filter (a real ball never approaches this on a 263 mm board; a
  # value this high is a tracker mislock, not motion):
  velocity_max_speed_mm_s: 250.0
  # --- Composure / stabilize state ---
  # Breaks the freak-out cascade seen at hole 1: near-miss -> rough brake
  # -> ball too fast -> unstable -> follower pushed forward anyway -> fell.
  # Trips ONLY on a genuine runaway - speed above BOTH a large multiple of the
  # planned speed AND an absolute floor - so ordinary overshoot during normal
  # following never triggers it (with the old 2x/+20 threshold it stabilized
  # 64% of the run). While active it holds the entry position with damped
  # control and NO forward progress; it exits the moment the ball is back under
  # control (speed below exit_speed) for a brief settle, resetting the
  # followers so no stale integral/derivative relaunches the ball.
  stabilize_enabled: true
  stabilize_trigger_mult: 3.0             # fire above this x planned speed ...
  stabilize_overspeed_margin_mm_s: 40.0   # ... and above planned + this ...
  stabilize_trigger_speed_mm_s: 55.0      # ... and above this absolute floor
  stabilize_exit_speed_mm_s: 18.0  # "back under control" = slower than this
  stabilize_settle_s: 0.2          # hold that recovery this long, then resume
  stabilize_max_s: 2.0             # give up holding after this and resume
  stabilize_kp: 0.010              # hold-position pull per mm of drift
  stabilize_kd: 0.012              # damping per mm/s of residual speed
  # --- Route speed profile (replaces the per-frame reactive hole cap) ---
  # Computed ONCE at startup over the whole route: hole passes, wall
  # clearance, corners, and goal approach become speed limits by place, then
  # a backward pass guarantees every slowdown is reachable by braking and a
  # forward pass smooths acceleration. The controller tracks the planned
  # speed at its current progress: one smooth plan, no dueling caps.
  # Committed speed THROUGH a hole pass. Deliberately not a crawl: slow
  # rolling near a hole maximizes exposure and stiction cycling; a moderate
  # committed speed crosses quickly and stably.
  hole_pass_mm_s: 15.0
  hole_slow_band_mm: 15.0   # ramp from cruise down to pass speed over this
  # Latest pseudostuck run stalled in the 193-201mm corridor with target speed
  # around 12mm/s and no local hole danger. Keep safe corridors rolling above
  # the observed stiction-dominated crawl regime.
  profile_floor_mm_s: 15.0  # the plan never asks for slower than this
  end_speed_mm_s: 10.0      # arrive gently at the goal
  hole_margin_mm: 2.0       # extra capture clearance around each hole
  ball_radius_mm: 4.0
  # Achievable deceleration from board tilt; used for the profile's braking
  # and acceleration passes and the emergency stopping-distance check.
  hole_brake_accel_mm_s2: 250
  # Reactive: full brake opposite the velocity (bypassing the slew limiter)
  # when the trajectory enters a hole and stopping distance exceeds the
  # distance to it.
  hole_emergency_brake: true
  # The emergency only fires for genuine RUN-OFFS. The route legitimately
  # threads between close holes whose capture zones overlap the centerline;
  # a ball rolling along the route there is a planned pass (the crawl
  # handles it), and braking it creates a brake/kick limit cycle that acts
  # like an invisible wall. Fire only when the ball is off the centerline
  # or moving misaligned with the path direction:
  hole_emergency_offroute_mm: 15.0
  hole_emergency_align_deg: 50.0
  # When the ball is stalled while physically close to a wall, ensure the
  # command has at least this much component away from the nearest wall. This
  # is a local unstick bias for outside-corner catches; it does not change
  # normal path following in open space.
  wall_escape_distance_mm: 3.0
  wall_escape_speed_mm_s: 15.0
  wall_escape_command: 0.22
  wall_escape_min_command: 0.08
  # The runtime wall speed-scale is OFF-route protection ONLY, applied once the
  # ball drifts more than this off the centerline. The speed profile already
  # slows for planned wall clearance on-route; applying the runtime scale
  # on-route too double-counts it, and a dense/over-marked wall mask then
  # crushed the on-route speed to a crawl and parked the ball at the start.
  wall_scale_cross_track_mm: 8.0
  # Local recovery planner: when the ball is off-route, stalled, or the
  # marker is across a wall, plan a temporary A* path from the actual ball
  # position to the current carrot/marker through wall- and hole-safe space.
  # Re-enabled: the not-moving problem was the velocity estimator and command
  # slew, not A*. Caveat: the camera's oblique wall view can make the ball look
  # like it is touching a wall, which can fire false "A* recovery: wall"
  # episodes - watch the status line; if it hijacks the carrot, set false again.
  recovery_astar_enabled: true
  recovery_astar_grid_mm: 4.0
  recovery_astar_follow_mm: 20.0
  recovery_astar_goal_lookahead_mm: 35.0
  recovery_astar_max_backtrack_mm: 4.0
  recovery_astar_cross_track_mm: 15.0
  recovery_astar_wall_mm: 4.0
  recovery_astar_stall_speed_mm_s: 5.0
  recovery_astar_stall_duration_s: 0.8
  recovery_astar_wall_clearance_mm: 2.0
  recovery_astar_hole_clearance_mm: 0.0
  recovery_astar_max_snap_mm: 18.0
  recovery_astar_max_expansions: 8000

maze:
  # Play-area size. VERIFY WITH A RULER: merged value was 3220x2820,
  # assumed to mean 322.0x282.0 mm.
  # Maze dimensions: 322.0x282.0 mm
  # actual play area size is 263mm x 222mm
  width_mm: 263.0
  height_mm: 222.0
  # The real traced route (scripts/auto_trace_path.py). example_path.csv is
  # scaffold dummy data - do not point the runner at it.
  path_file: "configs/maze_path_auto.csv"
